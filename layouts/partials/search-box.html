{{/* Pagefind 搜索框：作为头部小型搜索入口，跳转到 /search/ 完整结果页 */}}
{{/* 注意：Pagefind CSS/JS 在 baseof.html 中全局加载，此处只渲染搜索框 UI */}}
<div class="search-box" role="search">
    <form action="{{ "/search/" | relLangURL }}" method="get" class="search-form" aria-label="{{ T "search_label" | default "Site search" }}">
        <label for="search-input" class="sr-only">{{ T "search_placeholder" | default "Search AI tools, prices, guides..." }}</label>
        <input
            type="search"
            id="search-input"
            name="q"
            class="search-input"
            placeholder="{{ T "search_placeholder" | default "Search AI tools, prices, guides..." }}"
            autocomplete="off"
            aria-label="{{ T "search_label" | default "Search" }}"
        >
        <button type="submit" class="search-submit" aria-label="{{ T "search_submit" | default "Search" }}">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
    </form>
</div>
