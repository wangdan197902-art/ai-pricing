name: Daily Price Fetch

on:
  schedule:
    # 每日北京时间 14:00 = UTC 6:00
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install requests beautifulsoup4 lxml jsonschema python-dateutil

      - name: Configure git
        run: |
          git config user.name "AI Pricing Bot"
          git config user.email "bot@pricing.ai-term-hub.com"

      - name: Run price fetcher
        continue-on-error: true
        run: python3 scripts/fetch_prices.py

      - name: Check for price changes
        id: check_changes
        run: |
          if git diff --exit-code data/price_history.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No price changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Price changes detected."
          fi

      - name: Commit and push price changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git add data/price_history.json data/price_change_report.md
          git commit -m "chore(prices): daily price update $(date -u +'%Y-%m-%d')"
          git push

      - name: Trigger deploy workflow
        if: steps.check_changes.outputs.changed == 'true'
        uses: benc-uk/workflow-dispatch@v1.2.4
        with:
          workflow: deploy.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "✅ 价格已更新，已触发部署工作流。"
          else
            echo "ℹ️ 无价格变更，跳过部署。"
          fi
