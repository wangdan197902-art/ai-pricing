# GitHub Actions 矩阵部署工作流模板（github-pages-部署器专用）
#
# 使用方式：
#   1. 由 scripts/创建工作流.py 自动填充占位符并写入 .github/workflows/deploy-matrix.yml
#   2. 占位符：wangdan197902-art / pricing / ai-term-hub.com / 0.140.0
#   3. 在仓库 Settings → Secrets 中添加 PERSONAL_GITHUB_TOKEN（由 scripts/配置secrets.py 完成）
#   4. 推送到 main 分支即可触发25语种并行部署
#
# 部署目标：25个独立仓库的 gh-pages 分支
# 自定义域名：{lang}.{site_type}.{domain}

name: Deploy Multilingual Sites (Matrix)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SITE_TYPE: pricing
  DOMAIN: ai-term-hub.com
  HUGO_VERSION: '0.140.0'
  GITHUB_USER: wangdan197902-art
  PYTHON_VERSION: '3.11'
  # Agnes LLM 配置（用于内容生成，可选）
  AGNES_LLM_MODEL: ${{ secrets.AGNES_LLM_MODEL }}
  AGNES_LLM_BASE_URL: ${{ secrets.AGNES_LLM_BASE_URL }}
  AGNES_LLM_API_KEY: ${{ secrets.AGNES_LLM_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lang: [ar, cs, da, de, el, en, es, fi, fr, hu, id, it, ja, ko, nl, no, pl, pt, ro, ru, sv, tr, vi, zh]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install openai requests

      - name: Generate tools data
        run: python3 scripts/lib/tools_data.py

      - name: Generate UI translations
        run: python3 scripts/lib/i18n.py

      - name: Generate Markdown pages for ${{ matrix.lang }}
        run: |
          # 全部 25 个语种均使用 generate_pages.py 生成完整内容
          # 5 个扩展语种(cs/el/fi/hu/ro)的 UI 文案缺失时自动回退到英文
          echo "Generating content for ${{ matrix.lang }}..."
          python3 scripts/generate_pages.py --all --lang ${{ matrix.lang }}

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build ${{ matrix.lang }} site
        run: |
          hugo --config hugo.toml,hugo-${{ matrix.lang }}.toml \
               --minify \
               --destination public-${{ matrix.lang }}

      - name: Prepare single-lang publish dir
        run: |
          # Hugo构建产物在 public-{lang}/{lang}/ 子目录下（因为hugo.toml设置了baseURL=/）
          # 我们只把当前语种的内容作为根目录推送，避免其他语种目录污染
          mkdir -p publish-${{ matrix.lang }}
          if [ -d "public-${{ matrix.lang }}/${{ matrix.lang }}" ]; then
            cp -r public-${{ matrix.lang }}/${{ matrix.lang }}/* publish-${{ matrix.lang }}/
            for shared in css js images fonts static assets; do
              if [ -d "public-${{ matrix.lang }}/$shared" ]; then
                cp -r "public-${{ matrix.lang }}/$shared" "publish-${{ matrix.lang }}/"
              fi
            done
            for f in favicon.svg logo.svg og-image.svg site.webmanifest llms.txt BingSiteAuth.xml; do
              if [ -f "public-${{ matrix.lang }}/$f" ]; then
                cp "public-${{ matrix.lang }}/$f" "publish-${{ matrix.lang }}/"
              fi
            done
          else
            cp -r public-${{ matrix.lang }}/* publish-${{ matrix.lang }}/
          fi

      - name: Add CNAME and .nojekyll
        run: |
          echo "${{ env.SITE_TYPE }}-${{ matrix.lang }}.${{ env.DOMAIN }}" > publish-${{ matrix.lang }}/CNAME
          touch publish-${{ matrix.lang }}/.nojekyll
          # IndexNow API Key 文件（用于 Bing/Yandex 即时索引推送）
          echo "a0f6b5032dd63cf84271ae3ab4fcaf86" > publish-${{ matrix.lang }}/a0f6b5032dd63cf84271ae3ab4fcaf86.txt

      - name: Fix root redirect pages (Hugo 0.140.0 multi-lang bug)
        run: |
          # Hugo 0.140.0 在多语种构建时，根目录 /index.html 和 /page/1/index.html 
          # 会生成"重定向到默认语种子目录"的页面（< 1KB）
          # 但因为 baseURL 已是单语种域名，重定向到自身导致无限循环
          # 修复：用 /page/2/index.html（真正首页第一页内容）覆盖
          cd publish-${{ matrix.lang }}
          
          # 找到真正首页内容（/page/2/index.html 通常是2.6M真正内容）
          REAL_HOME=""
          for p in page/2 page/3 page/4 page/5 page/6; do
            if [ -f "$p/index.html" ] && [ $(wc -c < "$p/index.html") -gt 10000 ]; then
              REAL_HOME="$p/index.html"
              break
            fi
          done
          
          if [ -z "$REAL_HOME" ]; then
            echo "⚠️ 未找到真正首页内容（扩展语种），生成静态占位首页"
            # 对于5个扩展语种（cs/el/fi/hu/ro），i18n.py 不支持，只有占位 _index.md
            # 生成一个静态 HTML 占位首页，覆盖根目录重定向页
            printf '%s\n' \
              '<!doctype html>' \
              "<html lang=\"${{ matrix.lang }}\"><head><meta charset=UTF-8>" \
              '<meta name=viewport content="width=device-width,initial-scale=1">' \
              "<title>AI Tools Pricing - ${{ matrix.lang }}</title>" \
              "<meta name=description content=\"AI Tools Pricing Comparison - ${{ matrix.lang }}\">" \
              '<meta name=robots content="index,follow">' \
              "<link rel=canonical href=\"https://${{ env.SITE_TYPE }}-${{ matrix.lang }}.ai-term-hub.com/\">" \
              '<style>' \
              'body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#e5e7eb;margin:0;padding:40px 20px;text-align:center}' \
              'h1{color:#60a5fa;font-size:2.5rem;margin-bottom:1rem}' \
              'p{font-size:1.1rem;line-height:1.6;max-width:600px;margin:0 auto 1rem}' \
              '.badge{display:inline-block;background:#1e293b;color:#60a5fa;padding:4px 12px;border-radius:4px;font-size:0.9rem;margin-top:1rem}' \
              '</style></head>' \
              '<body>' \
              '<h1>AI Tools Pricing</h1>' \
              "<p>${{ matrix.lang }} - AI 工具价格对比站点</p>" \
              '<p>This site is under construction. Full content will be available soon.</p>' \
              '<p class="badge">Powered by GitHub Pages + Hugo</p>' \
              '</body></html>' > index.html
            echo "✅ 生成静态占位首页: $(wc -c < index.html) 字节"
          else
            echo "✅ 找到真正首页内容: $REAL_HOME ($(wc -c < $REAL_HOME) 字节)"
            
            # 修复根目录 index.html（如果是重定向页 < 1KB）
            if [ -f index.html ] && [ $(wc -c < index.html) -lt 1000 ]; then
              echo "⚠️ 根目录 index.html 是重定向页 ($(wc -c < index.html) 字节)，用 $REAL_HOME 覆盖"
              cp "$REAL_HOME" index.html
            fi
            
            # 修复 /page/1/index.html（如果是重定向页 < 1KB）
            if [ -f page/1/index.html ] && [ $(wc -c < page/1/index.html) -lt 1000 ]; then
              echo "⚠️ /page/1/index.html 是重定向页 ($(wc -c < page/1/index.html) 字节)，用 $REAL_HOME 覆盖"
              cp "$REAL_HOME" page/1/index.html
            fi
          fi
          
          # 修复 sitemap.xml：去掉 /{lang}/ 前缀（Hugo 错误地添加了）
          if [ -f sitemap.xml ]; then
            SITEMAP_SIZE_BEFORE=$(wc -c < sitemap.xml)
            sed -i "s|<loc>https://${{ env.SITE_TYPE }}-${{ matrix.lang }}\.${{ env.DOMAIN }}/${{ matrix.lang }}/|<loc>https://${{ env.SITE_TYPE }}-${{ matrix.lang }}.${{ env.DOMAIN }}/|g" sitemap.xml
            SITEMAP_SIZE_AFTER=$(wc -c < sitemap.xml)
            REMOVED=$(awk "BEGIN{print $SITEMAP_SIZE_BEFORE - $SITEMAP_SIZE_AFTER}")
            echo "✅ 修复 sitemap.xml：去除了 ${{ matrix.lang }}/ 前缀（减少 $REMOVED 字节）"
          fi
          
          echo "=== 修复后根目录 index.html 大小: $(wc -c < index.html) 字节 ==="

      - name: Inject WebSite JSON-LD and optimize homepage
        run: |
          # 注入 WebSite JSON-LD 并优化首页大小
          # 解决 3 个问题：
          # 1. WebSite 类型 JSON-LD 缺失（因 /page/2/index.html 覆盖 /index.html，.IsHome=false）
          # 2. 首页过大（2.6MB+，限制工具卡片数到 20）
          # 3. 兜底修复 title 中的 "AI Terms Dictionary"（若 hugo-{lang}.toml 修复未生效）
          cd publish-${{ matrix.lang }}
          python3 ../scripts/inject_seo.py . --lang ${{ matrix.lang }} --max-tool-cards 20
          echo "=== 首页大小: $(wc -c < index.html) 字节 ==="
          echo "=== WebSite JSON-LD 检查: $(grep -c '"@type": "WebSite"' index.html) 个 ==="

      - name: Build Pagefind index
        continue-on-error: true
        run: |
          set -x
          # 安装 Pagefind（使用直接 URL 避免 CloudCannon→Pagefind 仓库迁移重定向）
          curl -fL https://github.com/Pagefind/pagefind/releases/download/v1.5.2/pagefind-v1.5.2-x86_64-unknown-linux-musl.tar.gz \
            -o pagefind.tar.gz
          tar -xzf pagefind.tar.gz
          chmod +x pagefind
          ./pagefind --version

          # 诊断：检查 publish 目录内容
          echo "=== publish-${{ matrix.lang }} 目录内容（前20项）==="
          ls "publish-${{ matrix.lang }}/" | head -20
          echo "=== HTML 文件数量 ==="
          find "publish-${{ matrix.lang }}" -name "*.html" | wc -l
          echo "=== search 目录检查 ==="
          ls "publish-${{ matrix.lang }}/search/" 2>/dev/null || echo "⚠️ search 目录不存在"

          # 为当前语种构建索引（直接对 publish 目录索引，输出 /pagefind/ 子目录）
          ./pagefind --site "publish-${{ matrix.lang }}" \
                     --output-subdir "pagefind"

          echo "✅ Pagefind 索引构建完成"
          ls "publish-${{ matrix.lang }}/pagefind/" 2>/dev/null | head -5 || echo "⚠️ pagefind 目录未生成"

      - name: Deploy to ${{ matrix.lang }}.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          external_repository: ${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}
          publish_branch: gh-pages
          publish_dir: ./publish-${{ matrix.lang }}
          force_orphan: true
          user_name: 'Deploy Agent'
          user_email: 'deploy@ai-term-hub.com'
          commit_message: 'Auto-deploy ${{ matrix.lang }} site (single-lang)'

      - name: Notify deployment
        run: |
          echo "✅ Deployed: https://${{ env.SITE_TYPE }}-${{ matrix.lang }}.${{ env.DOMAIN }}"
          echo "📦 Repository: https://github.com/${{ env.GITHUB_USER }}/${{ env.SITE_TYPE }}-${{ matrix.lang }}"
