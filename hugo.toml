baseURL = "/"
languageCode = "en-us"
title = "AI Tools Pricing"
DefaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "AI Tools Pricing Comparison and Money Saving"
  author = "Website Project"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.en]
    languageName = "English"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
