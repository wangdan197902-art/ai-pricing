baseURL = "https://pricing.ai-term-hub.com/"
languageCode = "en-us"
title = "AI Tools Pricing"
DefaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = false
enableGitInfo = false
paginate = 1000
disableKinds = ["taxonomy", "term", "RSS"]
timeout = "600s"
printPathWarnings = false
printUnusedTemplates = false
logLevel = "error"

[params]
  description = "Compare AI tools pricing, features and find the best deals. 1000+ AI tools across 20 languages."
  author = "AI Pricing Hub"
  site_url = "https://pricing.ai-term-hub.com"
  default_og_image = "/images/og-default.svg"

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  page = ["HTML"]

[taxonomies]
  category = "categories"
  tag = "tags"
  tool_type = "types"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    title = "AI Tools Pricing"
    [languages.en.params]
      description = "Compare AI tools pricing, features and find the best deals."
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-cn"
    weight = 2
    title = "AI工具价格对比"
    [languages.zh.params]
      description = "对比AI工具价格、功能,寻找最佳优惠。"
  [languages.es]
    languageName = "Español"
    languageCode = "es-es"
    weight = 3
    title = "Precios de Herramientas IA"
  [languages.fr]
    languageName = "Français"
    languageCode = "fr-fr"
    weight = 4
    title = "Prix des Outils IA"
  [languages.de]
    languageName = "Deutsch"
    languageCode = "de-de"
    weight = 5
